services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_NAME:-open-wearables}
      POSTGRES_USER: ${DB_USER:-open-wearables}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-open-wearables}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open-wearables -d open-wearables"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 60s
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/app.sh
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  celery-worker:
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/worker.sh
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - app
    restart: unless-stopped

  celery-beat:
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/beat.sh
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - redis
      - db
      - app
    restart: unless-stopped

  flower:
    image: open-wearables-platform:latest
    pull_policy: never
    command: scripts/start/flower.sh
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
    ports:
      - "5556:5555"
    depends_on:
      - redis
      - db
      - app
    restart: unless-stopped

  redis:
    image: redis:8
    volumes:
      - redis_data:/var/lib/redis/data
    restart: unless-stopped

  svix-server:
    container_name: svix-server__open-wearables
    image: svix/svix-server:v1
    entrypoint:
      - sh
      - -c
      - |
        : "$${SVIX_JWT_SECRET:=$$SECRET_KEY}"
        export SVIX_JWT_SECRET
        exec svix-server "$$@"
      - --
    command: ["--run-migrations"]
    env_file:
      - ./backend/config/.env
    environment:
      SVIX_DB_DSN: "postgresql://${DB_USER:-open-wearables}:${DB_PASSWORD:-open-wearables}@${DB_HOST:-db}:${DB_PORT:-5432}/svix"
      SVIX_QUEUE_TYPE: "redis"
      SVIX_REDIS_DSN: "redis://redis:6379/1"
      SVIX_CACHE_TYPE: "redis"
    expose:
      - "8071"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "svix-server", "healthcheck", "http://localhost:8071"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL in your environment}
    image: open-wearables-frontend:latest
    pull_policy: never
    ports:
      - "3000:3000"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
